<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character set and responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">
    <title>Report a Sighting</title>
</head>
<body>
    <!-- Navigation Bar -->
    <nav id="nav-trial-1">
        <div class="container-fluid py-2 d-flex align-items-center justify-content-between">
            <!-- Left side: Logo and navigation links, spaced evenly -->
            <div class="d-flex align-items-center gap-3">
                <!-- Website logo -->
                <a href="#"><img src="Images/Hornet-Logo-Black.png" alt="Curly 'g', which is the website logo."></a>
                <!-- Navigation links -->
                <a href="#" class="text-decoration-none text-black fw-bold">HOME</a>
                <a href="#" class="text-decoration-none text-black fw-bold">ABOUT</a>
                <a href="#" class="text-decoration-none text-black fw-bold">REPORT</a>
                <a href="#" class="text-decoration-none text-black fw-bold">MORE</a>
            </div>
            <!-- Right side: Contact Us button -->
            <a href="#" class="btn btn-dark px-2 px-md-3 py-1 rounded-pill fw-bold align-items-center">CONTACT US</a>
        </div>
    </nav>



    <section class="hero-banner py-5" style="background-color: #FFC219; color: #000;">
        <div class="container">
            <div class="row align-items-center">
                <!-- Info on the left -->
                <div class="col-md-6 mb-4 mb-md-0">
                    <h1 class="display-5 fw-bold">REPORT A SIGHTING</h1>
                    <p class="lead">Discover, report, and learn about wasps and hornets. Join us in making our environment safer and more informed.</p>
                    <button class="btn btn-dark mt-3">About Us</button>
                </div>
                <!-- Image on the right -->
                <div class="col-md-6 text-center">
                    <img src="Images/bannerbee.png" alt="Wasp Team Logo" class="img-fluid" style="max-height: 250px;">
                </div>
            </div>
        </div>
    </section>



    <!-- Footer Section -->
    <footer id="footer-trial-1" class="text-white py-2 container-fluid">
        <div class="row align-items-center px-3">
            <!-- Logo and copyright -->
            <div class="col-12 col-md-auto mb-3 mb-md-0 d-flex flex-column align-items-center align-items-md-start">
                <a href="#"><img src="../Images/Hornet-Logo-White.png" alt="Logo" class="footer-logo mb-1 mx-4" style="height: 50px;"></a>
                <p class="mb-0 small fw-light text-center text-md-start">Wasp Team 2026.</p>
            </div>


            











            <!-- Spacer for layout on medium+ screens -->
            <div class="col-md d-none d-md-block"></div>
            <!-- Footer navigation links -->
            <div class="col-12 col-md-auto">
                <div class="d-flex flex-column flex-md-row gap-md-3">
                    <!-- First group of links -->
                    <hr class="w-100 d-md-none border-light opacity-50 my-2">
                    <div class="border-md-start ps-md-4 py-md-1">
                        <a href="#" class="d-block text-decoration-none text-white small">Home</a>
                        <a href="#" class="d-block text-decoration-none text-white small">About Us</a>
                    </div>
                    <!-- Second group of links -->
                    <hr class="w-100 d-md-none border-light opacity-50 my-2">
                    <div class="border-md-start ps-md-4 py-md-1">
                        <a href="#" class="d-block text-decoration-none text-white small">Report</a>
                        <a href="#" class="d-block text-decoration-none text-white small">Identification</a>
                    </div>
                    <!-- Third group of links -->
                    <hr class="w-100 d-md-none border-light opacity-50 my-2">
                    <div class="border-md-start ps-md-4 py-md-1">
                        <a href="#" class="d-block text-decoration-none text-white small">Info</a>
                        <a href="#" class="d-block text-decoration-none text-white small">Safety</a>
                    </div>
                    <hr class="w-100 d-md-none border-light opacity-50 mt-2">
                </div>
            </div>
        </div>
    </footer>
    <!-- Bootstrap JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
